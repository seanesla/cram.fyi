<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cram.fyi analytics</title>
<link rel="stylesheet" href="analytics.css">
</head>
<body>
<main>
  <header>
    <h1>cram.fyi analytics</h1>
    <a href="flashcards.html">back to flashcards</a>
  </header>

  <div class="stats">
    <section class="stat">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="totalStat">0</div>
    </section>
    <section class="stat">
      <div class="stat-label">Unfamiliar</div>
      <div class="stat-value unfamiliar" id="unfamiliarStat">0</div>
    </section>
    <section class="stat">
      <div class="stat-label">Somewhat Familiar</div>
      <div class="stat-value somewhat" id="somewhatStat">0</div>
    </section>
    <section class="stat">
      <div class="stat-label">Familiar</div>
      <div class="stat-value familiar" id="familiarStat">0</div>
    </section>
    <section class="stat">
      <div class="stat-label">Mastered</div>
      <div class="stat-value mastered" id="masteredStat">0</div>
    </section>
  </div>

  <div class="offline" id="offline"></div>

  <div class="chart-grid">
    <section class="chart-panel wide"><canvas id="sectionChart"></canvas></section>
    <section class="chart-panel"><canvas id="weaknessChart"></canvas></section>
    <section class="chart-panel"><canvas id="overallChart"></canvas></section>
  </div>

  <section class="table-panel">
    <table>
      <thead>
        <tr>
          <th>Study Guide Area</th>
          <th>Topic</th>
          <th>Unfamiliar</th>
          <th>Somewhat Familiar</th>
          <th>Familiar</th>
          <th>Mastered</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="topicTable"></tbody>
    </table>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="analytics.mjs"></script>
</body>
</html>
